# nginx/conf.d/savestack.conf
#
# This is the config for the OUTER Nginx — the public-facing router for SaveStack.
# It is the only entry point into the stack from the internet, sitting on host
# ports 80 and 443. Nothing else is publicly exposed.
#
# Its responsibilities are:
#   1. Redirect all HTTP traffic to HTTPS
#   2. Terminate SSL so backend services only deal with plain HTTP internally
#   3. Route /api/ requests to the FastAPI backend container
#   4. Route everything else to the frontend container
#
# It does not serve files or run application logic — it only forwards traffic
# to the right container over Docker's internal app network.

# Upstream blocks define the internal Docker service addresses.
# Nginx resolves these names via Docker's internal DNS.
# "backend" and "frontend" map to the container names in docker-compose.yml.

upstream backend {
    server backend:5000;  # FastAPI container, port 5000
}

upstream frontend {
    server frontend:80;   # Inner Nginx container serving the React static files
}

# HTTP server — exists only to redirect to HTTPS.
# 301 is a permanent redirect, so browsers cache it and go straight to HTTPS next time.
server {
    listen 80;
    server_name savestack.ojogulabs.xyz;
    return 301 https://$host$request_uri;
}

# HTTPS server — handles all real traffic.
server {
    listen 443 ssl;
    server_name savestack.ojogulabs.xyz;

    # SSL certificates issued by Let's Encrypt via Certbot.
    # These files live on the host at /etc/letsencrypt/ and are mounted
    # into this container read-only. Certificates expire every 90 days —
    # see the deployment section of the docs for the renewal process.
    ssl_certificate /etc/letsencrypt/live/savestack.ojogulabs.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/savestack.ojogulabs.xyz/privkey.pem;

    # API requests — forwarded to the FastAPI backend.
    # Note: no trailing slash on proxy_pass. A trailing slash would cause Nginx
    # to strip the /api/ prefix before forwarding, so FastAPI would receive
    # /v1/root instead of /api/v1/root and return a 404.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other requests — forwarded to the frontend container.
    # The inner Nginx handles SPA fallback (try_files) from here.
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}