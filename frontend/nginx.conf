# frontend/nginx.conf
#
# This is the config for the Nginx instance running INSIDE the frontend container.
# Its only job is to serve the static files produced by `npm run build` (the dist/ folder).
#
# It is not the public-facing Nginx. The outer Nginx (nginx/conf.d/savestack.conf)
# handles SSL, the domain, and routing. This inner Nginx only ever receives traffic
# forwarded from the outer Nginx — it is never exposed to the internet directly.

server {
    listen 80;

    # Serve files from the dist/ folder, copied here during the Docker build stage.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Try to serve the requested file directly. If it doesn't exist, fall back
        # to index.html. This is required for React Router to work correctly —
        # React is a Single Page Application with only one real HTML file.
        # Without this fallback, refreshing on any route other than / would return
        # a 404 because the file doesn't physically exist in dist/.
        try_files $uri $uri/ /index.html;
    }
}